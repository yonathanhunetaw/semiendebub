name: Duka CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    # 1. Set up a real MySQL database just like your Docker setup
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: dukapass
          MYSQL_DATABASE: duka
          MYSQL_USER: dukauser
          MYSQL_PASSWORD: dukapass
        ports:
          - 3310:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -pdukapass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - uses: actions/checkout@v4

    # 2. Match your Dockerfile Node.js version (23.x)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '23'

    # 3. Match your Dockerfile PHP version (8.4) & extensions
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: bcmath, bz2, gd, gmp, intl, mysqli, pdo_mysql, soap, sockets, sodium, tidy, zip
        coverage: none

    - name: Prepare Environment File
      run: cp .env.example .env

    # 4. Install PHP Dependencies
    - name: Install Composer Dependencies
      run: composer install --prefer-dist --no-ansi --no-interaction --no-progress

    # 5. Compile Frontend Assets (Crucial for Vite/Mix)
    - name: Install NPM Dependencies and Build
      run: |
        npm ci
        npm run build

    - name: Generate App Key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    # 6. Run Tests using the MySQL service
    - name: Execute Tests via PHPUnit/Pest
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3310
        DB_DATABASE: duka
        DB_USERNAME: dukauser
        DB_PASSWORD: dukapass
      run: |
        php artisan migrate:fresh
        php artisan test
