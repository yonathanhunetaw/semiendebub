services:
  app:
    # ❌ NO code mount in production
    volumes:
      - storage_data:/var/www/html/storage

    # Only expose HTTP/HTTPS
    ports:
      - "80:80"
      - "443:443"

    # Ensure correct env
    environment:
      APP_ENV: production

    # Restart policy (good for prod)
    restart: unless-stopped
