services:
  duka_app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ../:/var/www/html
      - storage_data:/var/www/html/storage
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
      # 🎯 ADD THIS SUB-MOUNT OVERRIDE TO UNLOCK YOUR HOST FILES INSIDE THE VOLUME:
      - ../storage/app/seed-images:/var/www/html/storage/app/seed-images
    ports:
      - "8095:80"
      - "5177:5177"
