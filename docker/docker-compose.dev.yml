services:
  duka-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ../:/var/www/html:delegated
      - storage_data:/var/www/html/storage
      - vendor_data:/var/www/html/vendor
      - ../storage/app/seed-images:/var/www/html/storage/app/seed-images:delegated
    ports:
      - "8095:80"
      - "5177:5177"
    networks:
      - duka-network

  duka-minio:
    image: minio/minio
    container_name: duka-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - duka-network
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-setup:
    image: minio/mc:latest
    container_name: duka-minio-setup
    depends_on:
      - duka-minio
    entrypoint: >
      /bin/sh -c "
      echo '=== MinIO Setup Starting ===';
      sleep 5;
      if mc alias set local http://duka-minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY} 2>&1; then
        mc mb local/${AWS_BUCKET:-duka-images} --ignore-existing;
        mc anonymous set download local/${AWS_BUCKET:-duka-images};
        echo '=== MinIO Setup Complete ===';
      else
        echo '=== MinIO Setup Failed ===';
        exit 1;
      fi"
    networks:
      - duka-network
    restart: "no"

networks:
  duka-network:
    driver: bridge

volumes:
  storage_data:
  vendor_data:
  minio_data:
  db_data: