services:
  duka-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: duka-app
    volumes:
      - ../:/var/www/html
      - storage_data:/var/www/html/storage
      - vendor_data:/var/www/html/vendor
      - ../storage/app/seed-images:/var/www/html/storage/app/seed-images
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
    networks:
      - duka-network
    depends_on:
      duka-db:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully

  duka-db:
    image: mysql:8.0
    container_name: duka-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-duka}
      MYSQL_USER: ${DB_USERNAME:-duka_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - database_data:/var/lib/mysql
    networks:
      - duka-network
    healthcheck:
      test: ["CMD", "mysql", "-u", "root", "-p${DB_PASSWORD:-password}", "-e", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s

  duka-minio:
    image: minio/minio
    container_name: duka-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      # Use these exact variables in your .env
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data

  minio-setup:
    image: minio/mc:latest
    container_name: duka-minio_setup
    depends_on:
      duka-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo '=== MinIO Setup Starting ===';
      sleep 5;
      
      MAX_RETRIES=10;
      RETRY_COUNT=0;
      
      while [ $$RETRY_COUNT -lt $$MAX_RETRIES ]; do
        RETRY_COUNT=$$((RETRY_COUNT + 1));
        echo \"Attempt $$RETRY_COUNT of $$MAX_RETRIES to configure MinIO...\";
        
        if mc alias set local http://duka-minio:9000 ${AWS_ACCESS_KEY_ID:-admin} ${AWS_SECRET_ACCESS_KEY:-password123} 2>&1; then
          echo '✅ Connected to MinIO';
          
          mc mb local/${AWS_BUCKET:-duka-images} --ignore-existing 2>&1;
          mc policy set public local/${AWS_BUCKET:-duka-images} 2>&1;
          
          echo '✅ MinIO setup completed successfully!';
          exit 0;
        else
          echo \"❌ Failed to connect (attempt $$RETRY_COUNT)\";
          if [ $$RETRY_COUNT -lt $$MAX_RETRIES ]; then
            sleep 5;
          fi;
        fi;
      done;
      
      echo '❌ MinIO setup failed after all retries';
      exit 1;
      "
    networks:
      - duka-network
    restart: "no"

networks:
  duka-network:
    driver: bridge

volumes:
  storage_data:
  vendor_data:
  minio_data:
  database_data: