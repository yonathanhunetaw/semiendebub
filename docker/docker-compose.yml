name: duka

services:
  duka_app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: duka_app
    restart: unless-stopped
    ports:
      - "8095:80"
      - "5177:5177"
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - duka-network

  db:
    image: mysql:8.0
    container_name: Duka_db
    env_file:
      - ../.env
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - database_data:/var/lib/mysql
    networks:
      - duka-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 3s
      retries: 10

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yaml:/tmp/config.yaml
    command: -config.file=/tmp/config.yaml
    networks:
      - duka-network
    restart: unless-stopped

networks:
  duka-network:
    driver: bridge

volumes:
  database_data:
  vendor_data:
  storage_data:
  node_modules_data:
  minio_data: