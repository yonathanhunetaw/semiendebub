services:
  duka_app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: duka_app
    volumes:
      - ../:/var/www/html
      - storage_data:/var/www/html/storage
      - vendor_data:/var/www/html/vendor
      - ../storage/app/seed-images:/var/www/html/storage/app/seed-images
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
    networks:
      - duka-network
    depends_on:
      db:
        condition: service_healthy
      Duka_minio:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: Duka_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-duka}
      MYSQL_USER: ${DB_USERNAME:-duka_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - database_data:/var/lib/mysql
    networks:
      - duka-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  Duka_minio:
    image: minio/minio:latest
    container_name: Duka_minio
    command: server /data --console-address ":9001"
    networks:
      - duka-network
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-admin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-password123}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio_setup:
    image: minio/mc:latest
    container_name: Duka_minio_setup
    depends_on:
      Duka_minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo '=== MinIO Setup Starting ===';
      sleep 5;
      
      MAX_RETRIES=10;
      RETRY_COUNT=0;
      
      while [ $$RETRY_COUNT -lt $$MAX_RETRIES ]; do
        RETRY_COUNT=$$((RETRY_COUNT + 1));
        echo \"Attempt $$RETRY_COUNT of $$MAX_RETRIES to configure MinIO...\";
        
        if mc alias set local http://Duka_minio:9000 ${AWS_ACCESS_KEY_ID:-admin} ${AWS_SECRET_ACCESS_KEY:-password123} 2>&1; then
          echo '✅ Connected to MinIO';
          
          mc mb local/${AWS_BUCKET:-duka-images} --ignore-existing 2>&1;
          mc policy set public local/${AWS_BUCKET:-duka-images} 2>&1;
          
          echo '✅ MinIO setup completed successfully!';
          exit 0;
        else
          echo \"❌ Failed to connect (attempt $$RETRY_COUNT)\";
          if [ $$RETRY_COUNT -lt $$MAX_RETRIES ]; then
            sleep 5;
          fi;
        fi;
      done;
      
      echo '❌ MinIO setup failed after all retries';
      exit 1;
      "
    networks:
      - duka-network
    restart: "no"

networks:
  duka-network:
    driver: bridge

volumes:
  storage_data:
  vendor_data:
  minio_data:
  database_data: