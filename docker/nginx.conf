server {
    listen 80;
    server_name _;

    # 1. Proxy images to MinIO
    location /images/ {
        # The trailing slash on the proxy_pass strips /images/ from the request
        proxy_pass http://duka-minio:9000/duka-images/;
        proxy_set_header Host $host;
        proxy_buffering off;
        
        # CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';
        add_header Cache-Control "public, max-age=3600";
        
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';
            add_header Content-Length 0;
            return 204;
        }
    }

    # 2. Proxy everything else to your Laravel application
    location / {
        proxy_pass http://duka-app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}